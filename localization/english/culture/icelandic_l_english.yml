bookmark_sturla_snorri: "Hvamm-Sturla Þórðarson"
bookmark_sturla_snorri_desc: "Hvamm-Sturla Þórðarson bjó í Hvammi í Dölum. Hann var fæddur árið 1115 og dó 23. júlí 1183. Foreldrar hans voru Vigdís Svertingsdóttir og Þórður Gilsson goði á Staðarfell í Dölum. Sturla var goði eins og faðir hans. Hann var stórbokki og lét aldrei sinn hlut fyrir nokkrum manni. Hann stóð í illdeilum við Pál Sölvason prest í Reykholti og gekkst höfðinginn Jón Loftsson í Odda fyrir sáttum þeirra með því að bjóða Sturlu að fóstra yngsta son hans, Snorra."
bookmark_sturla_gudny: "Guðný Böðvarsdóttir"
bookmark_sturla_gudny_desc: "Guðný Böðvarsdóttir (c. 1142 – 1221) was an Icelandic matriarch in the Sturlungar clan. Her three sons, Þórðr, Sighvatr, and Snorri Sturluson, were important chieftains in the Age of the Sturlungs and its violent feuds. She managed the farms at Hvammue, Stað, Eyri, and Reykholt, she appears as a character in Sturlunga saga"

